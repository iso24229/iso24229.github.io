# External data sources.
#
# Sources are consumed as npm packages (@iso24229/<name>) — see
# package.json dependencies. This file retains repo/ref metadata for
# traceability and for the "sync badges" in the website UI.

sources:
  - name: iso639-data
    repoUrl: https://github.com/iso24229/iso639-data
    ref: v0.1.0
    npmPackage: "@iso24229/iso639-data"

  - name: iso15924-data
    repoUrl: https://github.com/iso24229/iso15924-data
    ref: v0.1.0
    npmPackage: "@iso24229/iso15924-data"

  - name: register
    repoUrl: https://github.com/iso24229/register
    ref: v0.1.0
    npmPackage: "@iso24229/register"

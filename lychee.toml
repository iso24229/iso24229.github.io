# Lychee Link Checker Configuration
# For Documentation: https://github.com/lycheeverse/lychee

# Cache results to avoid re-checking same URLs
cache = true
max_cache_age = "1d"

# Check both source files and built site
include_verbatim = true

# File types to check
include = [
  "dist/**/*.html"
]

# Exclude path patterns (file paths, not URLs)
exclude_path = [
  ".git",
  ".github",
  "node_modules",
  "vendor",
  ".cache",
  "dist/.nojekyll",
  "dist/CNAME",
]

# Exclude URL patterns (regex). Run on every link, external + internal.
# - localhost / 127.0.0.1: dev only
# - iso.org: behind Cloudflare, 403s automated requests regardless of UA
# - github.com/iso24229/register: private repo, 404 to unauthenticated
# - github.com/iso24229/proposals/issues/new: requires GitHub auth to view
#
# TODO (register-data): the URLs below are referenced from register entries
# and need to be updated in the iso24229/register repo.
# - icao.int/...9303_p3_cons_en.pdf: ICAO removed the legacy Doc 9303
#   Part 3 PDF; the new location is not discoverable. Affects 11 entries.
# - royin.go.th: Thailand Royal Institute server is unreachable from CI.
# - quod.lib.umich.edu: bot-blocked (403).
exclude = [
  "^https?://localhost:4321",
  "^https?://127\\.0\\.0\\.1",
  "^https?://www\\.iso\\.org/",
  "^https://github\\.com/iso24229/register",
  "^https://github\\.com/iso24229/proposals/issues/new",
  "^https://www\\.icao\\.int/publications/Documents/9303_p3_cons_en\\.pdf",
  "^https?://www\\.royin\\.go\\.th/",
  "^https://quod\\.lib\\.umich\\.edu/",
]

exclude_loopback = true

# Be tolerant of well-known CDN behaviour
accept = ["100..=399", "429"]

# Fewer retries, faster failure
max_retries = 1
timeout = 10

# More concurrency to scan many pages quickly
max_concurrency = 32

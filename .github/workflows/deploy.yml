name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # repository_dispatch is handled by bump-deps.yml, which commits a
  # lockfile bump and the resulting push re-triggers this workflow.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7

      - name: Install, build, and upload your site output
        uses: withastro/action@v6
        with:
          node-version: 22
          package-manager: pnpm@11.1.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

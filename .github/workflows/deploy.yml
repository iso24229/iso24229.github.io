name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repository
        uses: actions/checkout@v7
        with:
          depth: 1

      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          node-version: 24
          package-manager: pnpm@11
        env:
          # Default GITHUB_TOKEN authorises reads of same-org private
          # repos when "Allow GitHub Actions to create and approve pull
          # requests" is enabled on the org. For other private repos,
          # set a PAT in the website repo's secrets and reference it
          # here instead.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

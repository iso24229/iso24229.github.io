name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    # Triggered by iso24229/iso24229-register when register data merges
    types: [register-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7

      - name: Install, build, and upload your site output
        uses: withastro/action@v6
        with:
          node-version: 22
          package-manager: pnpm@11
        env:
          # PAT scoped to read the private iso24229-register repo.
          # The default GITHUB_TOKEN cannot clone same-org private repos.
          ISO24229_CI_PAT_TOKEN: ${{ secrets.ISO24229_CI_PAT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
